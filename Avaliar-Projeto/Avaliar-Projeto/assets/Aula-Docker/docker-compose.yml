services:
  database:
    image: bitnami/postgresql:latest
    environment:
      - POSTGRESQL_USERNAME=admin
      - POSTGRESQL_PASSWORD=password123
      - POSTGRESQL_DATABASE=aula_docker_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/bitnami/postgresql

  api:
    build: .
    ports:
      - "3333:3333"
    environment:
      - DATABASE_URL=postgresql://admin:password123@database:5432/aula_docker_db
    depends_on:
      - database
    volumes:
      - .:/usr/app
      - /usr/app/node_modules

volumes:
  postgres_data:
    driver: local
